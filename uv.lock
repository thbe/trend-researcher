version = 1
revision = 3
requires-python = ">=3.12"

[manifest]
members = [
    "api",
    "assessor",
    "core",
    "crawler",
    "trend-researcher",
]

[[package]]
name = "api"
version = "0.1.0"
source = { editable = "services/api" }
dependencies = [
    { name = "core" },
]

[package.metadata]
requires-dist = [{ name = "core", editable = "packages/core" }]

[[package]]
name = "assessor"
version = "0.1.0"
source = { editable = "services/assessor" }
dependencies = [
    { name = "core" },
]

[package.metadata]
requires-dist = [{ name = "core", editable = "packages/core" }]

[[package]]
name = "core"
version = "0.1.0"
source = { editable = "packages/core" }

[[package]]
name = "crawler"
version = "0.1.0"
source = { editable = "services/crawler" }
dependencies = [
    { name = "core" },
]

[package.metadata]
requires-dist = [{ name = "core", editable = "packages/core" }]

[[package]]
name = "trend-researcher"
version = "0.1.0"
source = { virtual = "." }
dependencies = [
    { name = "api" },
    { name = "assessor" },
    { name = "core" },
    { name = "crawler" },
]

[package.metadata]
requires-dist = [
    { name = "api", editable = "services/api" },
    { name = "assessor", editable = "services/assessor" },
    { name = "core", editable = "packages/core" },
    { name = "crawler", editable = "services/crawler" },
]
