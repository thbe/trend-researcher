[project]
name = "core"
version = "0.1.0"
description = "Shared domain types, database models, and Alembic migrations for Trend Researcher."
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0,<3.0",
    # SQLAlchemy's async engine requires greenlet at runtime; not pulled in
    # automatically by the base sqlalchemy distribution.
    "greenlet>=3.0",
    "asyncpg>=0.29,<1.0",
    "alembic>=1.13,<2.0",
    "pydantic>=2.6,<3.0",
    "pydantic-settings>=2.2,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
