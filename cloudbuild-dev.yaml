# =============================================================================
# Cloud Build Configuration - Trend Researcher (Development)
# =============================================================================
#
# Pipeline: Build -> Push -> Deploy
# Target:   Google Cloud Run (europe-west2)
# Trigger:  Push to main branch (after PR merge)
#
# CI/CD Flow (GitHub Flow):
#   1. CI: GitHub Actions on PR to main (build, lint, test)
#   2. CD Dev: This file on merge to main
#   3. CD Prod: cloudbuild.yaml on version tag (v*)
#
# Prerequisites:
#   1. Enable required APIs:
#      gcloud services enable cloudbuild.googleapis.com run.googleapis.com artifactregistry.googleapis.com
#
#   2. Create Artifact Registry repository (shared with prod):
#      gcloud artifacts repositories create trend-researcher-images \
#        --repository-format=docker --location=europe-west2
#
#   3. Create Cloud Storage bucket for development data:
#      gcloud storage buckets create gs://trend-researcher-data-dev \
#        --location=europe-west2 --uniform-bucket-level-access
#
#   4. Create Cloud Build trigger for main branch:
#      gcloud builds triggers create github \
#        --repo-name=trend-researcher \
#        --repo-owner=thbe \
#        --branch-pattern=^main$ \
#        --build-config=cloudbuild-dev.yaml \
#        --name=trend-researcher-dev
#
#   5. Manual build submission (always use --region to avoid global fallback):
#      gcloud builds submit --config=cloudbuild-dev.yaml \
#        --region=europe-west2 \
#        --substitutions=COMMIT_SHA=$(git rev-parse --short HEAD)
#
# =============================================================================

# -----------------------------------------------------------------------------
# Substitution Variables
# -----------------------------------------------------------------------------
substitutions:
  _SERVICE_NAME: trend-researcher-dev
  _REGION: europe-west2
  _REPOSITORY: trend-researcher-images
  _DATA_BUCKET: trend-researcher-data-dev

# -----------------------------------------------------------------------------
# Build Options
# -----------------------------------------------------------------------------
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

# -----------------------------------------------------------------------------
# Build Steps
# -----------------------------------------------------------------------------
steps:
  # ---------------------------------------------------------------------------
  # Step 1: Build Docker Image
  # ---------------------------------------------------------------------------
  - id: build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --file=services/api/Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest
      - --cache-from=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest
      - .

  # ---------------------------------------------------------------------------
  # Step 2: Push Image to Artifact Registry
  # ---------------------------------------------------------------------------
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}

  # ---------------------------------------------------------------------------
  # Step 3: Deploy to Cloud Run
  # ---------------------------------------------------------------------------
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --execution-environment=gen2
      - --memory=2Gi
      - --cpu=2
      - --timeout=600
      - --min-instances=0
      - --max-instances=1
      - --set-env-vars=BUILD_VERSION=development,BUILD_COMMIT=$COMMIT_SHA,BUILD_TIME=$BUILD_ID,CRAWLER_TOP_N=100,LOG_FORMAT=json,AUTH_SEED_USERNAME=admin@app.local
      - --set-secrets=TREND_INTERNAL_PAT=trend-internal-pat:latest
      - --add-volume=name=data-volume,type=cloud-storage,bucket=${_DATA_BUCKET},readonly=false
      - --add-volume-mount=volume=data-volume,mount-path=/app/data

# -----------------------------------------------------------------------------
# Artifacts: Images to store in Artifact Registry
# -----------------------------------------------------------------------------
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest
