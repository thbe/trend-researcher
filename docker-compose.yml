# Trend Researcher — local stack.
# Three services:
# - postgres:  long-running data store with healthcheck + named volume.
# - crawler:   one-shot ingest job (no restart policy by design — see ARC-001).
# - api:       FastAPI control-plane (/healthz, /runs, /topics, /internal/crawl)
#              on :8000. In prod (Cloud Run), Cloud Scheduler POSTs
#              /api/internal/crawl on a 12h cadence — replacing the in-stack
#              alpine+crond "scheduler" service that lived here through Phase 3.

services:
  postgres:
    image: postgres:16-alpine
    container_name: trend-postgres
    environment:
      POSTGRES_USER: trend
      POSTGRES_PASSWORD: trend
      POSTGRES_DB: trend_researcher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "trend", "-d", "trend_researcher"]
      interval: 2s
      timeout: 3s
      retries: 30

  crawler:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile
    image: trend-crawler:dev
    container_name: trend-crawler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Inside the compose network postgres resolves by service name.
      DATABASE_URL: postgresql+asyncpg://trend:trend@postgres:5432/trend_researcher
      CRAWLER_TOP_N: "100"
      LOG_FORMAT: json
      # Comma-separated source names to skip at runtime (case-insensitive,
      # whitespace-tolerant). Empty/unset = no filter. See Plan 03-03.
      CRAWLER_DISABLED_SOURCES: ""
    # No restart policy: the crawler is a one-shot job. Re-run with
    # `docker compose run --rm crawler` or via POST /api/internal/crawl.

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: trend-api:dev
    container_name: trend-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://trend:trend@postgres:5432/trend_researcher
      LOG_FORMAT: json
    ports:
      - "4000:8000"
    volumes:
      # G9 persistence: dumps land here. Compose uses external Postgres, so
      # the dump path is mostly exercised by the prod image (Cloud Run + GCS),
      # but mounting a volume lets local testing of pg-dump-rotate.sh work too.
      - appdata:/app/data
    # Give cleanup() trap enough wall-clock to run final dump + pg_ctl stop.
    stop_grace_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: trend-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  postgres_data:
  appdata:
  ollama_data:
