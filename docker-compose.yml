# Trend Researcher — local stack (Phase 3).
# Four services:
# - postgres:  long-running data store with healthcheck + named volume.
# - crawler:   one-shot ingest job (no restart policy by design — see ARC-001).
# - api:       FastAPI control-plane (/healthz, /runs) on :8000.
# - scheduler: alpine + crond, fires the crawler every 12h
#              (see services/scheduler/README.md — note the docker-socket
#              trust-model caveat: single-operator internal tool only).

services:
  postgres:
    image: postgres:16-alpine
    container_name: trend-postgres
    environment:
      POSTGRES_USER: trend
      POSTGRES_PASSWORD: trend
      POSTGRES_DB: trend_researcher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "trend", "-d", "trend_researcher"]
      interval: 2s
      timeout: 3s
      retries: 30

  crawler:
    build:
      context: .
      dockerfile: services/crawler/Dockerfile
    image: trend-crawler:dev
    container_name: trend-crawler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Inside the compose network postgres resolves by service name.
      DATABASE_URL: postgresql+asyncpg://trend:trend@postgres:5432/trend_researcher
      CRAWLER_TOP_N: "100"
      LOG_FORMAT: json
      # Comma-separated source names to skip at runtime (case-insensitive,
      # whitespace-tolerant). Empty/unset = no filter. See Plan 03-03.
      CRAWLER_DISABLED_SOURCES: ""
    # No restart policy: the crawler is a one-shot job. Re-run with
    # `docker compose run --rm crawler` or let the scheduler fire it.

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: trend-api:dev
    container_name: trend-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://trend:trend@postgres:5432/trend_researcher
      LOG_FORMAT: json
    ports:
      - "8000:8000"
    volumes:
      # G9 persistence: dumps land here. Compose uses external Postgres, so
      # the dump path is mostly exercised by the prod image (Cloud Run + GCS),
      # but mounting a volume lets local testing of pg-dump-rotate.sh work too.
      - appdata:/app/data
    # Give cleanup() trap enough wall-clock to run final dump + pg_ctl stop.
    stop_grace_period: 30s
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    image: trend-scheduler:dev
    container_name: trend-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Host docker socket: lets crond drive `docker compose` on the host.
      # See services/scheduler/README.md for the trust-model warning.
      - /var/run/docker.sock:/var/run/docker.sock
      # Repo root mounted read-only so `docker compose` sees this file.
      - .:/workspace:ro
    restart: unless-stopped

volumes:
  postgres_data:
  appdata:
